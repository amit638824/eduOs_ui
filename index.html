<!doctype html>
<html class="no-js" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <title>Super Computer Academy | Online Exam & Mock Test Portal</title>
    <meta
      name="description"
      content="Super Computer Academy — ISO 9001-2015 certified IT institute in Kerakat, Jaunpur. Online mock tests, certificate & diploma exams for Hardware, Networking, Software, CCC, and O Level."
    />
    <link rel="shortcut icon" type="image/png" href="/img/logo/sca-logo.png" />

    <!-- Edurock template CSS (served from /public) -->
    <link rel="stylesheet" href="/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/animate.min.css" />
    <link rel="stylesheet" href="/css/aos.min.css" />
    <link rel="stylesheet" href="/css/magnific-popup.css" />
    <link rel="stylesheet" href="/css/icofont.min.css" />
    <link rel="stylesheet" href="/css/slick.css" />
    <link rel="stylesheet" href="/css/swiper-bundle.min.css" />
    <link rel="stylesheet" href="/css/style.css" />

    <script>
      (function () {
        var stored = localStorage.getItem('theme-color');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (stored === 'dark' || (!stored && prefersDark)) {
          document.documentElement.classList.add('is_dark');
        }
        if (stored === 'light') {
          document.documentElement.classList.remove('is_dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
